name: Publish

on:
  workflow_run:
    workflows: ["Unit Tests"]
    branches: ["main"]
    types: ["completed"]


# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: tests
  cancel-in-progress: true

permissions:
  id-token: write

jobs:
  publish:
    environment: pypi
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      
      - name: Build
        run: uv build
    
      - name: Publish
        run: uv publish

