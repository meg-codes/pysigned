name: Main

on:
  push:
    branches: [main]

concurrency:
  group: main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        python:
          - 3.11
          - 3.12
          - 3.13
          - 3.14
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Run unit tests
        run: uv run pytest

  changes:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.filter.outputs.publish }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            publish:
              - 'src/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'LICENSE'
              - 'THIRD-PARTY-LICENSES'

  docs:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish:
    needs: [test, changes]
    if: needs.changes.outputs.publish == 'true'
    environment: pypi
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Get version
        id: version
        run: echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: uv build

      - name: Publish
        run: uv publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            dist/* \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
